name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

# Cancel in-progress runs when a new push occurs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default; jobs that need more opt in explicitly below.
permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: "8.4"
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Copy environment file
        run: cp .env.development .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Create test database
        run: |
          mkdir -p storage/app/db
          touch storage/app/db/database.sqlite
          touch storage/app/db/testing.sqlite

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests
        run: php artisan test --parallel

  quality:
    name: PHP Lint & Static Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: "8.4"
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      # Runs Pint (--test) + PHPStan via the project's composer "lint" script.
      - name: Lint and analyse
        run: composer lint

      # Fails the job only on known security advisories. Abandoned packages are
      # reported (not failed) — that's a maintenance concern, not a CVE.
      - name: Audit Composer dependencies
        run: composer audit --no-interaction --abandoned=report

  frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Matches the deno version used by the Dockerfile frontend-builder stage.
      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: "2.5.6"

      - name: Install dependencies
        run: deno install

      - name: Lint
        run: deno task lint

      - name: Check formatting
        run: deno task fmt:check

      - name: Build assets
        run: deno task build

  release:
    name: Create Release
    needs: [test, quality, frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create and push tags / GitHub Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    outputs:
      new_tag: ${{ steps.next_version.outputs.next_version }}
      released: ${{ steps.check_release.outputs.needs_release }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: get_tag
        run: |
          # Get the latest tag, or use v0.0.0 if none exists
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"

      - name: Calculate next version
        id: next_version
        run: |
          LATEST_TAG="${{ steps.get_tag.outputs.latest_tag }}"

          # Remove 'v' prefix if present
          VERSION=${LATEST_TAG#v}

          # No previous tag: this is the first release.
          if [ "$VERSION" = "0.0.0" ]; then
            echo "next_version=v0.1.0" >> $GITHUB_OUTPUT
            echo "Next version: v0.1.0 (first release)"
            exit 0
          fi

          # Decide the bump from Conventional Commit messages since the last tag.
          #   feat: / feat(scope):            -> minor
          #   <type>!: or "BREAKING CHANGE"   -> major
          #   anything else (fix:, chore: ...) -> patch
          RANGE="${LATEST_TAG}..HEAD"
          SUBJECTS=$(git log "$RANGE" --no-merges --format='%s')
          BODIES=$(git log "$RANGE" --no-merges --format='%B')

          BUMP="patch"
          if printf '%s\n' "$SUBJECTS" | grep -qE '^[a-z]+(\([^)]+\))?!:' \
            || printf '%s\n' "$BODIES" | grep -qE 'BREAKING[ -]CHANGE'; then
            BUMP="major"
          elif printf '%s\n' "$SUBJECTS" | grep -qE '^feat(\([^)]+\))?:'; then
            BUMP="minor"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEXT_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "next_version=v${NEXT_VERSION}" >> $GITHUB_OUTPUT
          echo "Bump: ${BUMP} -> Next version: v${NEXT_VERSION}"

      - name: Check if release needed
        id: check_release
        run: |
          LATEST_TAG="${{ steps.get_tag.outputs.latest_tag }}"

          # Check if there are commits since the last tag
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            echo "needs_release=true" >> $GITHUB_OUTPUT
            echo "First release needed"
          else
            COMMITS_SINCE_TAG=$(git rev-list ${LATEST_TAG}..HEAD --count)
            if [ "$COMMITS_SINCE_TAG" -gt 0 ]; then
              echo "needs_release=true" >> $GITHUB_OUTPUT
              echo "Found $COMMITS_SINCE_TAG commits since $LATEST_TAG"
            else
              echo "needs_release=false" >> $GITHUB_OUTPUT
              echo "No new commits since $LATEST_TAG"
            fi
          fi

      - name: Generate changelog
        id: changelog
        if: steps.check_release.outputs.needs_release == 'true'
        run: |
          LATEST_TAG="${{ steps.get_tag.outputs.latest_tag }}"

          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            # First release - get all commits
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges | head -50)
          else
            # Get commits since last tag
            CHANGELOG=$(git log ${LATEST_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi

          # Write to file to handle multiline
          echo "$CHANGELOG" > changelog.txt
          echo "Changelog generated"

      - name: Create and push tag
        if: steps.check_release.outputs.needs_release == 'true'
        run: |
          NEXT_VERSION="${{ steps.next_version.outputs.next_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEXT_VERSION" -m "Release $NEXT_VERSION"
          git push origin "$NEXT_VERSION"

      - name: Create GitHub Release
        if: steps.check_release.outputs.needs_release == 'true'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ steps.next_version.outputs.next_version }}
          name: Release ${{ steps.next_version.outputs.next_version }}
          body_path: changelog.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        if: steps.check_release.outputs.needs_release == 'true'
        run: |
          echo "## Release Created :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.next_version.outputs.next_version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Changelog" >> $GITHUB_STEP_SUMMARY
          cat changelog.txt >> $GITHUB_STEP_SUMMARY

      - name: No release needed
        if: steps.check_release.outputs.needs_release != 'true'
        run: |
          echo "## No Release Needed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No new commits since ${{ steps.get_tag.outputs.latest_tag }}" >> $GITHUB_STEP_SUMMARY

  build:
    name: Build and Push Docker Image
    # All checks are listed so their .result is available to the if: below.
    needs: [test, quality, frontend, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push image to GHCR
    if: >-
      always()
      && needs.test.result == 'success'
      && needs.quality.result == 'success'
      && needs.frontend.result == 'success'
      && (needs.release.outputs.released == 'true' || github.event_name == 'pull_request')

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Fetch tags
        if: needs.release.outputs.released == 'true'
        run: git fetch --tags --force

      - name: Update version in config
        if: needs.release.outputs.released == 'true'
        run: |
          VERSION="${{ needs.release.outputs.new_tag }}"
          VERSION="${VERSION#v}"  # Remove 'v' prefix
          sed -i "s/'version' => '[^']*'/'version' => '$VERSION'/" config/app.php
          echo "Updated config/app.php to version $VERSION"
          grep "'version'" config/app.php

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.description=A self-hosted media gallery downloader with yt-dlp integration
          tags: |
            # Set latest tag for master branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            # Tag with branch name
            type=ref,event=branch
            # Tag with PR number
            type=ref,event=pr
            # Tag with the new release version if created
            type=raw,value=${{ needs.release.outputs.new_tag }},enable=${{ needs.release.outputs.released == 'true' }}
            # Tag with short SHA
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: .docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          target: production
          cache-from: type=gha
          # Disabled cache-to due to intermittent GHA cache export failures
          # cache-to: type=gha,mode=max
          provenance: false
          sbom: false
          outputs: type=image,compression=zstd,compression-level=3,force-compression=true
          build-args: |
            APP_ENV=production
            APP_DEBUG=false

      # Opt-in hardware-encode variant: same image + Intel/AMD VAAPI drivers,
      # published as `<tag>-vaapi`. amd64 only (the VAAPI drivers are x86).
      - name: Extract metadata for Docker (VAAPI variant)
        id: meta_vaapi
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
            suffix=-vaapi
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=raw,value=${{ needs.release.outputs.new_tag }},enable=${{ needs.release.outputs.released == 'true' }}

      - name: Build and push Docker image (VAAPI variant)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: .docker/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta_vaapi.outputs.tags }}
          labels: ${{ steps.meta_vaapi.outputs.labels }}
          target: production
          cache-from: type=gha
          provenance: false
          sbom: false
          outputs: type=image,compression=zstd,compression-level=3,force-compression=true
          build-args: |
            APP_ENV=production
            APP_DEBUG=false
            INSTALL_VAAPI=true

      - name: Generate build summary
        run: |
          echo "## Docker Image Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tags" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Platforms" >> $GITHUB_STEP_SUMMARY
          echo "- linux/amd64" >> $GITHUB_STEP_SUMMARY
          echo "- linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Variants" >> $GITHUB_STEP_SUMMARY
          echo "- \`*-vaapi\` (linux/amd64): adds Intel + AMD VAAPI drivers for \`media:reencode --accel=vaapi\`" >> $GITHUB_STEP_SUMMARY
