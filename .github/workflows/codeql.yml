name: "CodeQL"

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]
    schedule:
        - cron: "30 1 * * 0" # Weekly on Sunday at 1:30 AM

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    analyze:
        name: Analyze
        runs-on: ubuntu-latest
        permissions:
            actions: read
            contents: read
            security-events: write

        strategy:
            fail-fast: false
            matrix:
                include:
                    # Note: CodeQL does not support PHP, so the Laravel backend is
                    # not covered here. JS/TS is interpreted, so build-mode: none.
                    - language: javascript-typescript
                      build-mode: none

        steps:
            - name: Checkout repository
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Initialize CodeQL
              uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
              with:
                  languages: ${{ matrix.language }}
                  build-mode: ${{ matrix.build-mode }}
                  config-file: ./.github/codeql/codeql-config.yml

            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
              with:
                  category: "/language:${{ matrix.language }}"
