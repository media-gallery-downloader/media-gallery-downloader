# Psalm taint analysis (security SAST for the PHP backend).
# CodeQL does not support PHP, so this fills the code-level security gap;
# composer audit (in ci.yml) covers the dependency-CVE half. Advisory only:
# findings are uploaded to the Security tab and do not fail the build.
name: Psalm

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  schedule:
    - cron: "15 3 * * 0" # Weekly on Sunday at 3:15 AM

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  psalm:
    name: Psalm taint analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read # for checkout
      security-events: write # for upload-sarif to publish results
      actions: read # required by upload-sarif on private repos

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: "8.4"
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      # psalm/plugin-laravel boots the app to resolve framework types, so it
      # needs an environment file and an app key.
      - name: Prepare application environment
        run: |
          cp .env.development .env
          php artisan key:generate

      # Psalm is a locked require-dev dependency (vimeo/psalm), so the version
      # is reproducible and Dependabot keeps it current.
      - name: Run Psalm taint analysis
        run: vendor/bin/psalm --taint-analysis --no-cache --report=psalm-results.sarif
        continue-on-error: true

      - name: Upload analysis results to GitHub
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          sarif_file: psalm-results.sarif
          wait-for-processing: true
